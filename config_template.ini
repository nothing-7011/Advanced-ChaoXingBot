[common]
; 使用cookie登录，填写true则忽略账号密码，直接从cookies.txt读取cookie登录
use_cookies=false

; 手机号账号(必填)
username=

; 登录密码(必填)
password=

; 要学习的课程ID列表, 逗号隔开(选填，不需要则留空)
course_list=

; 视频播放倍速(默认1，最大2)
speed=1

; 同时进行的章节数量
jobs=2

; 遇到关闭任务点时的行为: retry-重试(默认), continue-继续
notopen_action=retry

[tiku]
; 可选项 :
; 1. TikuYanxi(言溪题库 https://tk.enncy.cn/)
; 2. TikuLike(LIKE知识库 https://www.datam.site/)
; 3. TikuAdapter(开源项目 https://github.com/DokiDoki1103/tikuAdapter)
; 4. AI(支持 Gemini V1beta Compatible 和 OpenAI Compatible)
; 5. SiliconFlow(硅基流动AI：https://siliconflow.cn/)
provider=AI
; 是否提交答题，填写false表示答完题后不提交而是保存搜到的题目，随后你可以自行前往学习通修改或提交
submit=false
; 最低题库覆盖率
cover_rate=0.9
; 搜索多个题目时间隔的时间，单位秒
delay=1.0
; 仅获取所有习题而不动用Parser Agent和Solver Agent(仅AI大模型答题模式生效)
only_fetch_questions=false
; 用于言溪题库的TOKEN，同样使用英文逗号隔开多个，会按顺序去使用
; 或用于LIKE知识库的TOKEN，在使用LIKE知识库时会随机调用token进行查询。
tokens=
; 下面是用于LIKE知识库模型的专属配置，其他题库无需关注下列选项
likeapi_search=false
likeapi_vision=true
likeapi_model=glm-4.5-air
likeapi_retry=true
likeapi_retry_times=3
; 用于TikuAdapter题库的url
url=

; 硅基流动AI专属配置，以siliconflow开头的
siliconflow_key=
siliconflow_model=deepseek-ai/DeepSeek-R1
siliconflow_endpoint=https://api.siliconflow.cn/v1/chat/completions

; 用于判断判断题对应的选项，不要留有空格，不要留有引号，逗号为英文逗号
true_list=正确,对,√,是
false_list=错误,错,×,否,不对,不正确

[notification]
provider=ServerChan
; 外部通知服务的提供方对应地址
url=
; Telegram推送时使用的chat_id
tg_chat_id=XXXXXX

[parser]
; 可选: gemini_v1beta 或 openai_compatible
api_type=gemini_v1beta
; 用于Parser Agent的API Key
api_key=
; 模型名称
model=gemini-2.0-flash
; 随机性温度
temperature=0.7
; Gemini V1beta Compatible 或 OpenAI Compatible 端点
endpoint=https://generativelanguage.googleapis.com

[solver]
; 可选: gemini_v1beta 或 openai_compatible
api_type=openai_compatible
; 用于Solver Agent的API Key
api_key=
; 模型名称
model=gpt-5.4
; 随机性温度
temperature=0.7
; 请求间隔时间（秒）
request_interval=5.0
; Gemini V1beta Compatible 或 OpenAI Compatible 端点
endpoint=https://your-endpoint.example/v1
